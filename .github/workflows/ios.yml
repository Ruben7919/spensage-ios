name: iOS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Select Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Build App
        run: xcodebuild -project SpendSage.xcodeproj -scheme SpendSage -sdk iphonesimulator -destination "platform=iOS Simulator,id=$DEVICE_ID" CODE_SIGNING_ALLOWED=NO build

      - name: Run Tests
        run: xcodebuild test -project SpendSage.xcodeproj -scheme SpendSage -destination "platform=iOS Simulator,id=$DEVICE_ID" CODE_SIGNING_ALLOWED=NO
