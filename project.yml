name: SpendSage
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: SpendSage
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 8
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: YU855NB22W
    CODE_SIGN_STYLE: Automatic
targets:
  SpendSage:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SpendSage/Sources
      - path: SpendSage/Resources
    info:
      path: SpendSage/Info.plist
      properties:
        CFBundleDisplayName: SpendSage AI
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: Scan receipts and capture supporting images.
        NSPhotoLibraryUsageDescription: Import receipts and supporting images.
        NSPhotoLibraryAddUsageDescription: Save exported images and documents.
        CFBundleURLTypes:
          - CFBundleURLName: com.spendsage.ai
            CFBundleURLSchemes:
              - spendsage
        SpendSageCognitoHostedUIDomain: ""
        SpendSageCognitoUserPoolClientId: ""
        SpendSageCognitoRedirectSignIn: "spendsage://auth-callback"
        SpendSageCognitoRedirectSignOut: "spendsage://auth-logout"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spendsage.ai
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: SpendSage/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
  SpendSageTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SpendSageTests
    dependencies:
      - target: SpendSage
    settings:
      base:
        PRODUCT_NAME: SpendSageTests
        PRODUCT_BUNDLE_IDENTIFIER: com.spendsage.ai.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  SpendSage:
    build:
      targets:
        SpendSage: all
        SpendSageTests: [test]
    test:
      targets:
        - SpendSageTests
